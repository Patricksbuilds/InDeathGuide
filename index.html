<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>In Death: Unchained — Guide</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

<style>
:root {
  --black:#0a0805;
  --stone-dark:#111009;
  --stone-mid:#1c1a14;
  --stone-light:#2a2720;
  --gold:#c9a84c;
  --ash:#9c9488;
  --white:#f0ead8;
}

body {
  background: var(--black);
  color: var(--white);
  font-family: 'EB Garamond', serif;
  margin: 0;
}

/* NAV */
nav {
  position: fixed;
  width: 100%;
  backdrop-filter: blur(8px);
  background: rgba(10,8,5,0.9);
  z-index: 10;
}

.nav-inner {
  display: flex;
  justify-content: space-between;
  padding: 1rem 2rem;
}

.nav-links {
  list-style: none;
  display: flex;
  gap: 1.5rem;
}

.nav-links a {
  color: var(--ash);
  text-decoration: none;
}

/* HERO */
.hero {
  height: 100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hero-title {
  font-size: 3rem;
}

/* SECTION */
section {
  padding: 5rem 2rem;
}

.section-inner {
  max-width:1000px;
  margin:auto;
}

.section-title span {
  color: var(--gold);
}

/* WALKTHROUGHS */

.video-grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(260px,1fr));
  gap:1px;
  margin-top:2rem;
  border:1px solid var(--stone-light);
}

.video-card {
  background: var(--stone-dark);
  padding:1.5rem;
}

.video-frame {
  width:100%;
  aspect-ratio:16/9;
  border:1px solid var(--stone-light);
}

.video-frame iframe {
  width:100%;
  height:100%;
}

.video-frame.placeholder {
  display:flex;
  align-items:center;
  justify-content:center;
  color: var(--ash);
}

.video-title {
  color: var(--gold);
  margin-top:1rem;
}

.video-desc {
  color: var(--ash);
  font-size:0.9rem;
}

/* FOOTER */
footer {
  text-align:center;
  padding:2rem;
}
</style>
</head>

<body>

<nav>
  <div class="nav-inner">
    <div>In Death Guide</div>
    <ul class="nav-links">
      <li><a href="#walkthroughs">Walkthroughs</a></li>
      <li><a href="#overview">Overview</a></li>
    </ul>
  </div>
</nav>

<header class="hero">
  <div>
    <h1 class="hero-title">In Death: Unchained</h1>
    <p>The Afterlife has Fallen</p>
  </div>
</header>

<!-- WALKTHROUGHS -->
<section id="walkthroughs">
  <div class="section-inner">
    <h2 class="section-title">World <span>Walkthroughs</span></h2>

    <div class="video-grid">

      <div class="video-card">
        <div class="video-frame">
          <iframe src="https://www.youtube.com/embed/zmnd6SUvF9A" frameborder="0" allowfullscreen></iframe>
        </div>
        <p class="video-title">Purgatory</p>
        <p class="video-desc">First full test run of gameplay recording.</p>
      </div>

      <div class="video-card">
        <div class="video-frame placeholder">
          Coming Soon
        </div>
        <p class="video-title">Paradise Lost</p>
        <p class="video-desc">Coming walkthrough.</p>
      </div>

      <div class="video-card">
        <div class="video-frame placeholder">
          Coming Soon
        </div>
        <p class="video-title">The Abyss</p>
        <p class="video-desc">Endgame walkthrough.</p>
      </div>

    </div>
  </div>
</section>

<footer>
  <p>Fan-made guide</p>
</footer>

</body>
</html>
